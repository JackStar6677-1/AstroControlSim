<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AstroControlSim GitHub social card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05030d"/>
      <stop offset="45%" stop-color="#1b113a"/>
      <stop offset="100%" stop-color="#2c0f38"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f3e098"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <style>
      .ey { font: 700 26px 'Segoe UI', Arial; fill: #da70d6; letter-spacing: 6px; }
      .ti { font: 800 96px 'Segoe UI', Arial; fill: url(#gold); }
